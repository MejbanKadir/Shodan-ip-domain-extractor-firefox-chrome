<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="48" cy="48" r="44" fill="url(#bgGradient)" stroke="#00d4ff" stroke-width="3"/>
  
  <!-- Network/IP icon -->
  <g fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Globe/World -->
    <circle cx="48" cy="36" r="16"/>
    <ellipse cx="48" cy="36" rx="8" ry="16"/>
    <line x1="32" y1="36" x2="64" y2="36"/>
    
    <!-- Lines below -->
    <line x1="38" y1="56" x2="58" y2="56"/>
    <line x1="42" y1="64" x2="54" y2="64"/>
    <line x1="46" y1="72" x2="50" y2="72"/>
  </g>
  
  <!-- Magnifying glass -->
  <g fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round">
    <circle cx="62" cy="62" r="12" fill="none"/>
    <line x1="71" y1="71" x2="82" y2="82"/>
  </g>
</svg>
