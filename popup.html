<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shodan IP/Domain Extractor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      width: 280px;
      padding: 16px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2d3a5a;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 11px;
      color: #8892b0;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-ip {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #000;
    }

    .btn-ip:hover {
      background: linear-gradient(135deg, #00e5ff 0%, #00aadd 100%);
      transform: translateY(-1px);
    }

    .btn-domain {
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      color: #fff;
    }

    .btn-domain:hover {
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
      transform: translateY(-1px);
    }

    .btn-both {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
    }

    .btn-both:hover {
      background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
      border: 1px solid #10b981;
    }

    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid #ef4444;
    }

    .status.info {
      display: block;
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
      border: 1px solid #00d4ff;
    }

    .stats {
      margin-top: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      font-size: 11px;
      display: none;
    }

    .stats.visible {
      display: block;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      color: #8892b0;
    }

    .stats-row span:last-child {
      color: #00d4ff;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Shodan Extractor</h1>
    <p>Extract IPs & Domains from Shodan</p>
  </div>

  <div class="button-group">
    <button class="btn btn-ip" id="extractIPs">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
        <rect x="6" y="14" width="20" height="8" rx="2" ry="2"></rect>
        <line x1="6" y1="6" x2="6.01" y2="6"></line>
        <line x1="6" y1="18" x2="6.01" y2="18"></line>
      </svg>
      Extract IPs Only
    </button>

    <button class="btn btn-domain" id="extractDomains">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </svg>
      Extract Domains Only
    </button>

    <button class="btn btn-both" id="extractBoth">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      Extract Both (Combined)
    </button>
  </div>

  <div class="stats" id="stats">
    <div class="stats-row">
      <span>IPs Found:</span>
      <span id="ipCount">0</span>
    </div>
    <div class="stats-row">
      <span>Domains Found:</span>
      <span id="domainCount">0</span>
    </div>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
